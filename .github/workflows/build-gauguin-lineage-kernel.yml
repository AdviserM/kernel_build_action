name: Build Redmi Note 9 Pro Kernel (Lineage-18.1)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kernel:
    name: Build Kernel for Gauguin
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_xiaomi_gauguin
          ref: lineage-18.1
          path: kernel-source
          fetch-depth: 1

      - name: Patch Kernel Source
        run: |
          cd kernel-source

          # 1. 全局去除 -Werror（Makefile/Kbuild/.mk）
          find . -type f \( -name "Makefile" -o -name "Kbuild" -o -name "*.mk" \) \
            -exec sed -i 's/-Werror//g' {} +

          # 2. 修复 yylloc 多重定义（bison 3.8+ 兼容）
          #    覆盖所有可能的文件名变体
          for f in \
            scripts/dtc/dtc-lexer.l \
            scripts/dtc/dtc-lex.l \
            scripts/dtc/dtc-lexer.lex.c_shipped \
            scripts/dtc/dtc-lexer.lex.c
          do
            if [ -f "$f" ]; then
              sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' "$f"
              echo "Patched $f"
            fi
          done

      - name: Build Android Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: ./kernel-source/
          config: vendor/gauguin_user_defconfig
          arch: arm64

          # 关键修复：
          #   HOSTCC=gcc        → 用系统 GCC 编译 host 工具（scripts/dtc 等），
          #                        避免 clang-11 被当 HOSTCC 遇到不兼容参数
          #   HOSTCFLAGS=...    → 系统 GCC 编译 host 工具时也关闭 -Werror
          #   移除了 W=1        → W=1 会开启大量额外 warning，老内核过不了
          extra-make-args: '["HOSTCC=gcc", "HOSTCFLAGS=-Wno-error"]'

          aosp-clang: true
          aosp-gcc: true
          android-version: 11
          aosp-clang-version: r383902

          ksu: false
          lxc: false

          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
