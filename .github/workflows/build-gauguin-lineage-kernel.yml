name: Build Redmi Note 9 Pro Kernel (Lineage-18.1)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kernel:
    name: Build Kernel for Gauguin
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_xiaomi_gauguin
          ref: lineage-18.1
          path: kernel-source
          fetch-depth: 1

      - name: Patch Kernel Source
        run: |
          cd kernel-source

          # 1. 全局去除 -Werror
          find . -type f \( -name "Makefile" -o -name "Kbuild" -o -name "*.mk" \) \
            -exec sed -i 's/-Werror//g' {} +

          # 2. 强制 HOSTCC=gcc（写死在 Makefile 顶部绕过 action 的变量过滤）
          #    让系统 GCC 编译 host 工具（scripts/dtc 等），避免 clang-11 不兼容参数报错
          sed -i '1i HOSTCC = gcc' Makefile

          # 3. 删除 CLANG_TRIPLE 检查
          #    action 设置的 CLANG_TRIPLE 是 GCC 路径前缀（含 "android"），
          #    触发了 Makefile:489 的 $(error ...)
          sed -i '/Clang with Android --target detected. Did you specify CLANG_TRIPLE?/d' Makefile

          # 4. 修复 yylloc 多重定义（bison 3.8+ 兼容）
          for f in scripts/dtc/dtc-lexer.l scripts/dtc/dtc-lex.l \
                   scripts/dtc/dtc-lexer.lex.c_shipped scripts/dtc/dtc-lexer.lex.c; do
            if [ -f "$f" ]; then
              sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' "$f"
              echo "Patched $f"
            fi
          done

      - name: Build Android Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: ./kernel-source/
          config: vendor/gauguin_user_defconfig
          arch: arm64

          # HOSTCC 已在 Makefile 中写死，这里只需要 HOSTCFLAGS
          extra-make-args: '["HOSTCFLAGS=-Wno-error"]'

          aosp-clang: true
          aosp-gcc: true
          android-version: 11
          aosp-clang-version: r383902

          ksu: false
          lxc: false

          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
