name: Build Redmi Note 9 Pro Kernel (Lineage-18.1)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kernel:
    name: Build Kernel for Gauguin
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_xiaomi_gauguin
          ref: lineage-18.1
          path: kernel-source
          fetch-depth: 1

      - name: Patch Kernel Source
        run: |
          cd kernel-source

          # 1. 强制 HOSTCC 使用系统 GCC（绝对路径，避免被 PATH 中的 clang 干扰）
          sed -i '1i HOSTCC = /usr/bin/gcc' Makefile

          # 2. 追加 -Wno-error 覆盖所有 -Werror
          #    关键：不能用 sed 删除 -Werror！
          #    sed 's/-Werror//g' 会把 -Werror-implicit-function-declaration
          #    变成 -implicit-function-declaration（不合法参数，clang 报错）
          echo 'KBUILD_CFLAGS += -Wno-error' >> Makefile
          echo 'KBUILD_HOSTCFLAGS += -Wno-error' >> Makefile

          # 3. 删除 CLANG_TRIPLE 检查（action 传入的 CLANG_TRIPLE 含 "android" 触发此错误）
          sed -i '/Clang with Android --target detected. Did you specify CLANG_TRIPLE?/d' Makefile

          # 4. 修复 yylloc 多重定义（Ubuntu 22.04 bison 3.8+ 不再声明为 static）
          for f in scripts/dtc/dtc-lexer.l scripts/dtc/dtc-lex.l \
                   scripts/dtc/dtc-lexer.lex.c_shipped scripts/dtc/dtc-lexer.lex.c; do
            if [ -f "$f" ]; then
              sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' "$f"
              echo "Patched $f"
            fi
          done

      - name: Build Android Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: ./kernel-source/
          config: vendor/gauguin_user_defconfig
          arch: arm64
          aosp-clang: true
          aosp-gcc: true
          android-version: 11
          aosp-clang-version: r383902
          ksu: false
          lxc: false
          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
