name: Build Redmi Note 9 Pro Kernel (Lineage-18.1)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kernel:
    name: Build Kernel for Gauguin
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:20.04
      env:
        DEBIAN_FRONTEND: noninteractive
        TZ: Asia/Shanghai
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential bc bison flex libssl-dev libelf-dev \
            git curl wget sudo ca-certificates \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_xiaomi_gauguin
          ref: lineage-18.1
          path: kernel-source
          fetch-depth: 1

      - name: Patch Kernel Source
        run: |
          cd kernel-source
          sed -i '/Clang with Android --target detected. Did you specify CLANG_TRIPLE?/d' Makefile
          echo 'DTC_FLAGS += -Wno-duplicate_property_names' >> Makefile

      - name: Build Android Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: ./kernel-source/
          config: vendor/gauguin_user_defconfig
          arch: arm64
          aosp-clang: true
          aosp-gcc: true
          android-version: 11
          aosp-clang-version: r383902
          ksu: true
          lxc: true
          anykernel3: true
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
